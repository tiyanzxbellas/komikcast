<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Komikcast - Baca Komik Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #e8edf5;
            min-height: 100vh;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            padding: 20px 0;
            border-bottom: 1px solid #1e2630;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #f97316;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #e8edf5;
        }
        .search-box {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 440px;
            min-width: 180px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid #2a3440;
            background: #141a22;
            color: #e8edf5;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #f97316;
        }
        .search-box input::placeholder {
            color: #6b7a8d;
        }
        .search-box button {
            padding: 10px 22px;
            border-radius: 30px;
            border: none;
            background: #f97316;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #e0660e;
        }

        /* BANNER SLIDER */
        .banner-section {
            margin: 30px 0 40px;
        }
        .banner-slider {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 4px 2px 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .banner-slider::-webkit-scrollbar {
            height: 4px;
        }
        .banner-slider::-webkit-scrollbar-thumb {
            background: #f97316;
            border-radius: 4px;
        }
        .banner-slider::-webkit-scrollbar-track {
            background: #1e2630;
            border-radius: 4px;
        }
        .banner-item {
            flex: 0 0 280px;
            scroll-snap-align: start;
            border-radius: 16px;
            overflow: hidden;
            background: #141a22;
            border: 1px solid #1e2630;
            transition: 0.25s;
            cursor: pointer;
        }
        .banner-item:hover {
            transform: translateY(-4px);
            border-color: #f97316;
        }
        .banner-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        .banner-info {
            padding: 14px 16px 18px;
        }
        .banner-info h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .banner-info .meta {
            font-size: 12px;
            color: #8a9aa8;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .banner-info .meta .tag {
            background: #f9731622;
            color: #f97316;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        /* SECTION TITLE */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 36px 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title .badge {
            font-size: 12px;
            font-weight: 400;
            color: #8a9aa8;
            background: #1e2630;
            padding: 2px 12px;
            border-radius: 20px;
        }

        /* GRID KOMIK */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .card {
            background: #141a22;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #1e2630;
            transition: 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #f97316;
        }
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }
        .card-body {
            padding: 12px 14px 16px;
        }
        .card-body h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-body .chapters {
            font-size: 12px;
            color: #8a9aa8;
        }
        .card-body .rating {
            font-size: 12px;
            color: #fbbf24;
            font-weight: 600;
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6b7a8d;
        }
        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1e2630;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .banner-item {
                flex: 0 0 220px;
            }
            .banner-item img {
                height: 120px;
            }
            header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: 100%;
            }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (min-width: 1025px) {
            .grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- HEADER -->
        <header>
            <div class="logo">Komik<span>cast</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari komik..." />
                <button id="searchBtn">Cari</button>
            </div>
        </header>

        <!-- BANNER -->
        <section class="banner-section">
            <div class="banner-slider" id="bannerSlider">
                <div class="loading" style="width:100%; padding:20px;">
                    <div class="spinner"></div>
                    <span>Memuat banner...</span>
                </div>
            </div>
        </section>

        <!-- POPULAR -->
        <div class="section-title">🔥 Populer <span class="badge">minggu ini</span></div>
        <div class="grid" id="popularGrid">
            <div class="loading" style="grid-column:1/-1;">
                <div class="spinner"></div>
                <span>Memuat...</span>
            </div>
        </div>

        <!-- LATEST -->
        <div class="section-title">🆕 Terbaru</div>
        <div class="grid" id="latestGrid">
            <div class="loading" style="grid-column:1/-1;">
                <div class="spinner"></div>
                <span>Memuat...</span>
            </div>
        </div>

        <!-- RECOMMENDATIONS -->
        <div class="section-title">⭐ Rekomendasi</div>
        <div class="grid" id="recommendGrid">
            <div class="loading" style="grid-column:1/-1;">
                <div class="spinner"></div>
                <span>Memuat...</span>
            </div>
        </div>

        <!-- TRENDING -->
        <div class="section-title">📈 Trending</div>
        <div class="grid" id="trendingGrid">
            <div class="loading" style="grid-column:1/-1;">
                <div class="spinner"></div>
                <span>Memuat...</span>
            </div>
        </div>

        <!-- MOST BOOKMARKED -->
        <div class="section-title">🔖 Terbanyak di-bookmark</div>
        <div class="grid" id="bookmarkGrid">
            <div class="loading" style="grid-column:1/-1;">
                <div class="spinner"></div>
                <span>Memuat...</span>
            </div>
        </div>

    </div>

    <script>
        // ---------- BASE URL ----------
        const API_BASE = 'https://kcastapi.bani.biz.id';

        // ---------- HELPER FETCH ----------
        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        // ---------- RENDER CARD ----------
        function renderCard(series) {
            const cover = series.data.coverImage || '';
            const title = series.data.title || 'Untitled';
            const slug = series.data.slug || '#';
            const totalCh = series.data.totalChapters || '?';
            const rating = series.data.rating || 0;
            const link = `#/series/${slug}`;

            return `
                <div class="card" onclick="window.location='${link}'">
                    <img src="${cover}" alt="${title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22%3E%3Crect fill=%22%23141a22%22 width=%22200%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%236b7a8d%22 font-family=%22sans-serif%22 font-size=%2216%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Image%3C/text%3E%3C/svg%3E'" />
                    <div class="card-body">
                        <h4>${title}</h4>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
                            <span class="chapters">Ch ${totalCh}</span>
                            <span class="rating">⭐ ${rating}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ---------- RENDER BANNER ----------
        function renderBanner(banner) {
            const cover = banner.data.coverImage || '';
            const bg = banner.data.backgroundImage || cover;
            const title = banner.data.title || 'Untitled';
            const slug = banner.data.slug || '#';
            const format = banner.data.format || 'Komik';
            const link = `#/series/${slug}`;

            return `
                <div class="banner-item" onclick="window.location='${link}'">
                    <img src="${bg || cover}" alt="${title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 200%22%3E%3Crect fill=%22%23141a22%22 width=%22400%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%236b7a8d%22 font-family=%22sans-serif%22 font-size=%2216%22 text-anchor=%22middle%22 dy=%22.3em%22%3EBanner%3C/text%3E%3C/svg%3E'" />
                    <div class="banner-info">
                        <h3>${title}</h3>
                        <div class="meta">
                            <span>${format}</span>
                            <span class="tag">🔥 Hot</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ---------- LOAD DATA ----------
        async function loadSection(endpoint, containerId, renderFn, take = 10) {
            const container = document.getElementById(containerId);
            try {
                const url = endpoint.includes('?') ? endpoint : `${endpoint}?take=${take}`;
                const json = await fetchJSON(url);
                const items = json.data || [];

                if (!items.length) {
                    container.innerHTML =
                    `<div style="grid-column:1/-1;text-align:center;color:#6b7a8d;padding:30px;">Tidak ada data.</div>`;
                    return;
                }

                container.innerHTML = items.map(renderFn).join('');
            } catch (err) {
                console.error(`Error loading ${containerId}:`, err);
                container.innerHTML =
                    `<div style="grid-column:1/-1;text-align:center;color:#ef4444;padding:30px;">❌ Gagal memuat data. Coba refresh.</div>`;
            }
        }

        // ---------- LOAD ALL ----------
        async function loadAll() {
            // BANNER
            await loadSection(`${API_BASE}/banners`, 'bannerSlider', renderBanner, 20);

            // POPULAR (take 10)
            await loadSection(`${API_BASE}/series/popular?take=10&take_chapter=2`, 'popularGrid', renderCard);

            // LATEST (take 20)
            await loadSection(`${API_BASE}/series/latest?take=20&take_chapter=3&page=1`, 'latestGrid', renderCard, 20);

            // RECOMMENDATIONS (take 10)
            await loadSection(`${API_BASE}/series/recommendations?take=10&page=1&method=all`, 'recommendGrid', renderCard);

            // TRENDING (take 10)
            await loadSection(`${API_BASE}/series/trending?take=10&page=1`, 'trendingGrid', renderCard);

            // MOST BOOKMARKED (take 10)
            await loadSection(`${API_BASE}/series/most-bookmarked?take=10&page=1`, 'bookmarkGrid', renderCard);
        }

        // ---------- SEARCH ----------
        async function handleSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return alert('Masukkan judul komik yang ingin dicari.');

            const container = document.getElementById('popularGrid'); // reuse popular grid
            container.innerHTML = `<div class="loading" style="grid-column:1/-1;"><div class="spinner"></div><span>Mencari "${q}"...</span></div>`;

            try {
                const url =
                `${API_BASE}/series/search?take=12&page=1&take_chapter=2&q=${encodeURIComponent(q)}`;
                const json = await fetchJSON(url);
                const items = json.data || [];

                if (!items.length) {
                    container.innerHTML =
                        `<div style="grid-column:1/-1;text-align:center;color:#8a9aa8;padding:40px;">😕 Tidak ditemukan komik dengan judul "${q}".</div>`;
                    return;
                }

                // scroll ke hasil
                document.querySelector('.section-title').scrollIntoView({ behavior: 'smooth', block: 'start' });

                // update title sementara
                const titleEl = document.querySelector('.section-title');
                const origTitle = titleEl.innerHTML;
                titleEl.innerHTML = `🔍 Hasil untuk "${q}" <span class="badge">${items.length} ditemukan</span>`;

                container.innerHTML = items.map(renderCard).join('');

                // restore title after a while? biarkan saja.
            } catch (err) {
                console.error(err);
                container.innerHTML =
                    `<div style="grid-column:1/-1;text-align:center;color:#ef4444;padding:30px;">❌ Gagal mencari. Coba lagi.</div>`;
            }
        }

        // ---------- EVENT LISTENERS ----------
        document.getElementById('searchBtn').addEventListener('click', handleSearch);
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        // ---------- START ----------
        loadAll();
    </script>
</body>
</html>
